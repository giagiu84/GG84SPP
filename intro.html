<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GG84 – Inizia</title>

  <style>
    :root {
      --bg: #f4f4f2;
      --panel: #ffffff;
      --text: #111;
      --muted: #666;

      --green: #39e75f;
      --green-soft: #eefaf0;

      --safe-top: env(safe-area-inset-top, 0px);
    }

    body {
      margin: 0;
      font-family: Poppins, Arial;
      background: var(--bg);
      padding-top: calc(var(--safe-top) + 10px);
    }

    body::before {
      content:"";
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:calc(var(--safe-top) + 8px);
      background:#000;
      z-index:999;
    }

    .container {
      max-width:420px;
      margin:auto;
      padding:12px;
      text-align:center;
    }

    .logo {
      width:64px;
      height:64px;
      margin:10px auto;
    }

    .slide {
      display:none;
      background:white;
      border-radius:20px;
      padding:20px 16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
      animation:fade 0.3s;
    }

    .slide.active {
      display:block;
    }

    .icon {
      font-size:48px;
      margin-bottom:10px;
    }

    .title {
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }

    .text {
      font-size:14px;
      color:var(--muted);
    }

    .dots {
      display:flex;
      justify-content:center;
      gap:6px;
      margin:14px 0;
    }

    .dot {
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ccc;
    }

    .dot.active {
      background:#111;
    }

    .btn {
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1.5px solid #111;
      background:#111;
      color:#fff;
      font-weight:700;
      font-size:14px;
      margin-top:10px;
    }

    .btn.secondary {
      background:#fff;
      color:#111;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

  </style>

  <!-- GG84 PWA iOS - GG84_V.2_14.04.26 -->
  <meta name="theme-color" content="#0b0b0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GG84">
  <meta name="application-name" content="GG84">
  <meta name="format-detection" content="telephone=no">
  <meta name="gg84-update-tag" content="GG84_V.2_14.04.26">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="stylesheet" href="pwa-ios.css">
</head>

<body>

<div class="container">

  <img src="logo3.png" class="logo">

  <div class="slide active">
    <div class="icon">👤</div>
    <div class="title">Crea la tua identità</div>
    <div class="text">Ti servirà per iniziare</div>
  </div>

  <div class="slide">
    <div class="icon">🔗</div>
    <div class="title">Collegati con qualcuno</div>
    <div class="text">Invita o accetta un invito</div>
  </div>

  <div class="slide">
    <div class="icon">🔐</div>
    <div class="title">Scrivi e proteggi</div>
    <div class="text">Invia messaggi sicuri</div>
  </div>

  <div class="slide">
    <div class="icon">✅</div>
    <div class="title">Solo voi due leggete</div>
    <div class="text">Nessun altro può vedere</div>
  </div>

  <div class="dots" id="dots"></div>

  <button class="btn secondary" id="prevBtn" onclick="prev()">Indietro</button>
  <button class="btn" id="nextBtn" onclick="next()">Avanti</button>
  <button class="btn" id="startBtn" onclick="start()" style="display:none;">Inizia</button>

  <div style="margin-top:10px; font-size:11px; color:#aaa;">
    GG84_V3_25.04.26
  </div>

</div>

<script src="script.js"></script>

<script>
const slides = document.querySelectorAll(".slide");
const dots = document.getElementById("dots");
let index = 0;

let touchStartX = 0;
let touchEndX = 0;

function renderDots(){
  dots.innerHTML="";
  slides.forEach((_,i)=>{
    const d=document.createElement("div");
    d.className="dot"+(i===index?" active":"");
    dots.appendChild(d);
  });
}

function show(){
  slides.forEach(s=>s.classList.remove("active"));
  slides[index].classList.add("active");

  document.getElementById("prevBtn").style.display = index===0 ? "none":"block";

  if(index===slides.length-1){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("startBtn").style.display="block";
  } else {
    document.getElementById("nextBtn").style.display="block";
    document.getElementById("startBtn").style.display="none";
  }

  renderDots();
}

function next(){
  if(index<slides.length-1){
    index++;
    show();
  }
}

function prev(){
  if(index>0){
    index--;
    show();
  }
}

function start(){
  localStorage.setItem("gg84_intro_done","1");
  window.location.href="setup.html";
}

document.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe(){
  const delta = touchEndX - touchStartX;

  if(Math.abs(delta) < 50) return;

  if(delta < 0){
    next();
  } else {
    prev();
  }
}

show();

if (typeof setupAndroidBackNavigation === "function") {
  setupAndroidBackNavigation();
}
</script>


<script src="pwa-install.js" defer></script>
</body>
</html>
