<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GG84 – Messaggi protetti</title>

  <style>
    :root {
      --bg: #f4f4f2;
      --panel: #ffffff;
      --text: #111111;
      --muted: #5c5c5c;
      --shadow: 0 8px 18px rgba(0, 0, 0, 0.06);

      --green-main: #39e75f;
      --green-soft: #eefaf0;
      --green-line: rgba(27, 152, 63, 0.22);

      --blue-soft: #eef4ff;
      --blue-line: rgba(74, 118, 196, 0.22);

      --warning-soft: #fff8ee;
      --warning-line: rgba(218, 148, 19, 0.28);

      --success-soft: #f2fbf5;
      --success-line: rgba(0, 180, 90, 0.32);

      --danger-soft: #fff1f1;
      --danger-line: rgba(176, 0, 32, 0.22);

      --transition: 0.18s ease;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Poppins, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      padding-top: calc(var(--safe-top) + 12px);
      background:
        radial-gradient(circle at top center, rgba(57, 231, 95, 0.08) 0%, rgba(57, 231, 95, 0.02) 22%, rgba(0, 0, 0, 0) 44%),
        var(--bg);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(var(--safe-top) + 8px);
      background: #000000;
      z-index: 999;
      pointer-events: none;
    }

    .shell {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 14px 18px;
    }

    .hero-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .hero-wrap::before {
      content: "";
      position: absolute;
      inset: -10px;
      background:
        radial-gradient(circle at 14% 18%, rgba(57, 231, 95, 0.16) 0%, rgba(57, 231, 95, 0.06) 18%, rgba(0, 0, 0, 0) 42%);
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(17, 17, 17, 0.09);
      border-radius: 22px;
      padding: 12px 14px;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero-logo-wrap {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(17, 17, 17, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
    }

    .hero-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      display: block;
    }

    .hero-copy {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .hero-kicker {
      margin: 0 0 2px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4f4f4f;
      opacity: 0.9;
    }

    .hero-title {
      margin: 0;
      font-size: 0.94rem;
      font-weight: 800;
      line-height: 1.15;
      color: #0f0f0f;
    }

    .hero-subtitle {
      margin: 4px 0 0;
      font-size: 0.79rem;
      line-height: 1.34;
      color: #4f4f4f;
    }

    .banner {
      display: none;
      border-radius: 18px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 0.8rem;
      line-height: 1.45;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .banner.show { display: block; }
    .banner.mode {
      display: block;
      background: var(--blue-soft);
      border: 1px solid var(--blue-line);
      color: #27456f;
    }
    .banner.success {
      background: var(--success-soft);
      border: 1px solid var(--success-line);
      color: #1f6b3b;
    }
    .banner.warning {
      background: var(--warning-soft);
      border: 1px solid var(--warning-line);
      color: #8a5a12;
    }
    .banner.error {
      background: var(--danger-soft);
      border: 1px solid var(--danger-line);
      color: #8a1834;
    }

    .title-block {
      text-align: center;
      margin: 6px 0 10px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 900;
      color: #111;
    }

    .subtitle {
      margin: 5px auto 0;
      max-width: 300px;
      font-size: 0.8rem;
      color: #555;
      line-height: 1.35;
    }

    .main-card {
      background: var(--panel);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .contact-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: var(--green-soft);
      border: 1px solid var(--green-line);
      margin-bottom: 10px;
    }

    .contact-card.warn {
      background: var(--warning-soft);
      border-color: var(--warning-line);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
    }

    .contact-icon img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .contact-copy {
      min-width: 0;
      flex: 1;
    }

    .contact-label {
      margin: 0 0 2px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4c4c4c;
    }

    .contact-name {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      color: #101010;
      word-break: break-word;
    }

    .contact-state {
      margin: 4px 0 0;
      font-size: 0.77rem;
      line-height: 1.3;
      color: #4f4f4f;
    }

    .mode-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 2px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(17,17,17,0.08);
      font-size: 0.75rem;
      font-weight: 800;
      color: #1d1d1d;
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.7;
    }

    .mode-help {
      font-size: 0.76rem;
      color: #666;
      font-weight: 600;
    }

    .field-box {
      margin-top: 12px;
    }

    .field-label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.82rem;
      font-weight: 800;
      color: #1d1d1d;
    }

    .field-note {
      margin: 0 0 8px;
      font-size: 0.76rem;
      line-height: 1.35;
      color: #666;
    }

    textarea {
      width: 100%;
      border-radius: 16px;
      border: 1.5px solid #d9d9d2;
      background: #ffffff;
      color: #111111;
      font-size: 0.92rem;
      font-family: inherit;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      min-height: 165px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--green-main);
      box-shadow: 0 0 0 3px rgba(57, 231, 95, 0.12);
    }

    textarea.encrypted {
      background: #f7f7fb;
      border-color: rgba(74, 118, 196, 0.28);
    }

    textarea.decrypted {
      background: #fbfffc;
      border-color: rgba(0, 180, 90, 0.26);
    }

    .row {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      grid-template-columns: repeat(2, 1fr);
    }

    .btn {
      min-height: 42px;
      border-radius: 16px;
      border: 1.5px solid #111111;
      background: #ffffff;
      color: #111111;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--green-main);
      box-shadow:
        0 8px 14px rgba(0,0,0,0.08),
        0 0 0 1.5px var(--green-main);
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn.primary {
      background: #111111;
      color: #ffffff;
    }

    .btn.ghost {
      border-color: rgba(17,17,17,0.16);
      background: rgba(255,255,255,0.76);
      color: #454545;
    }

    .micro-note {
      margin-top: 10px;
      font-size: 0.74rem;
      line-height: 1.4;
      color: #666;
      text-align: center;
    }

    .footer-nav {
      margin-top: 12px;
    }

    .version {
      margin-top: 8px;
      text-align: center;
      font-size: 0.67rem;
      color: #9e9e9e;
      letter-spacing: 0.08em;
      opacity: 0.82;
    }

    .process-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      padding: 18px;
    }

    .process-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .process-content {
      width: min(280px, 88vw);
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 22px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .anim-logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      filter: drop-shadow(0 8px 16px rgba(57, 231, 95, 0.18));
      animation: pulseLogo 0.75s ease-in-out infinite alternate;
    }

    .anim-text {
      min-height: 44px;
      font-size: 0.74rem;
      line-height: 1.35;
      color: #1f1f1f;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .anim-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: #4b4b4b;
    }

    @keyframes pulseLogo {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    @media (max-width: 390px) {
      .row {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 150px;
      }
    }
  
    /* GG84 Glow standard */
    .btn:hover,
    .btn:focus-visible {
      border-color: var(--green-main);
      box-shadow:
        0 0 0 2px rgba(57,231,95,0.25),
        0 0 12px rgba(57,231,95,0.55),
        0 10px 18px rgba(57,231,95,0.18);
    }

    .btn.primary:hover,
    .btn.primary:focus-visible {
      box-shadow:
        0 0 0 2px rgba(57,231,95,0.35),
        0 0 14px rgba(57,231,95,0.65),
        0 12px 22px rgba(57,231,95,0.22);
    }

    textarea:focus {
      box-shadow:
        0 0 0 3px rgba(57,231,95,0.18),
        0 0 10px rgba(57,231,95,0.35);
    }


    .gg84-pulse-success {
      animation: gg84PulseSuccess 0.9s ease;
    }

    @keyframes gg84PulseSuccess {
      0% { box-shadow: 0 0 0 0 rgba(57,231,95,0.00); }
      30% { box-shadow: 0 0 0 4px rgba(57,231,95,0.16), 0 0 18px rgba(57,231,95,0.28); }
      100% { box-shadow: 0 0 0 0 rgba(57,231,95,0.00); }
    }
</style>

</head>
<body>
  <main class="shell">
    <div class="hero-wrap">
      <section class="hero">
        <div class="hero-logo-wrap">
          <img src="logo3.png" alt="GG84" class="hero-logo">
        </div>

        <div class="hero-copy">
          <h2 class="hero-title">Proteggi Messaggi tra Utenti</h2>
        </div>
      </section>
    </div>

    <div id="feedbackBanner" class="banner success"></div>
    <div id="warningBanner" class="banner warning"></div>
    <div id="errorBanner" class="banner error"></div>

    <section class="title-block">
      <h1>GG84</h1>
    </section>

    <section class="main-card">
      <div id="contactCard" class="contact-card">
        <div class="contact-icon">
          <img src="logo3.png" alt="GG84">
        </div>
        <div class="contact-copy">
          <p class="contact-label">Contatto attivo</p>
          <p id="contactName" class="contact-name">—</p>
          <p id="contactState" class="contact-state">In attesa di collegamento valido.</p>
        </div>
      </div>

      <div class="mode-strip">
        <div id="modeBadge" class="mode-badge">
          <span class="mode-dot"></span>
          <span>In attesa</span>
        </div>
       </div>

      <div class="field-box">
        <label class="field-label" for="text">Il tuo contenuto</label>
        <div class="field-note">Scrivi testo normale oppure incolla un messaggio protetto con GG84</div>
        <textarea id="text" placeholder="Scrivi qui il messaggio"></textarea>
      </div>

      <div class="row">
        <button id="mainActionBtn" class="btn primary" onclick="runMainAction()">Proteggi</button>
        <button class="btn" onclick="copyOrShareText()">Copia / Invia</button>
      </div>

      <div class="row">
        <button class="btn" onclick="clearMessageBox()">Nuovo</button>
        <button class="btn ghost" onclick="pasteFromClipboard()">Incolla</button>
      </div>


      <div class="micro-note">
        Formato condiviso sicuro con <strong>GG84 SPP</strong><br>
        I messaggi vanno copiati o inoltrati subito, non salvati sul dispositivo.
      </div>
    </section>

    <div class="footer-nav">
      <button class="btn ghost" onclick="location.href='index.html'">← Torna alla home</button>
    </div>

    <div class="version">GG84_V.2_29.03.26</div>
  </main>

  <div id="processOverlay" class="process-overlay">
    <div class="process-content">
      <img src="logo3.png" id="animLogo" class="anim-logo" alt="GG84">
      <div id="animText" class="anim-text"></div>
      <div id="animLabel" class="anim-label"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="gg84_ux.js"></script>
  <script>
    const textarea = document.getElementById("text");
    const mainActionBtn = document.getElementById("mainActionBtn");
    const modeBadge = document.getElementById("modeBadge");

    const feedbackBanner = document.getElementById("feedbackBanner");
    const warningBanner = document.getElementById("warningBanner");
    const errorBanner = document.getElementById("errorBanner");

    const contactCard = document.getElementById("contactCard");
    const contactName = document.getElementById("contactName");
    const contactState = document.getElementById("contactState");

    const overlay = document.getElementById("processOverlay");
    const animText = document.getElementById("animText");
    const animLabel = document.getElementById("animLabel");

    function ggSuccess(message, boxId = null) {
      if (window.GG84UX) {
        GG84UX.success(message, boxId);
      }
    }

    function ggWarning(message, boxId = null) {
      if (window.GG84UX) {
        GG84UX.warning(message, boxId);
      }
    }

    function ggError(message, boxId = null) {
      if (window.GG84UX) {
        GG84UX.error(message, boxId);
      }
    }

    function showBanner(el, message) {
      el.innerHTML = message;
      el.classList.add("show");
    }

    function hideBanner(el) {
      el.innerHTML = "";
      el.classList.remove("show");
    }

    function clearBanners() {
      hideBanner(feedbackBanner);
      hideBanner(warningBanner);
      hideBanner(errorBanner);
    }

    function detectMode(text) {
      const value = String(text || "").trim();
      if (!value) return "idle";
      return isEncryptedPayload(value) ? "decrypt" : "encrypt";
    }

    function setModeBadge(text) {
      modeBadge.innerHTML = `<span class="mode-dot"></span><span>${text}</span>`;
    }

    function updateMainActionUI() {
      const value = textarea.value.trim();
      const mode = detectMode(value);

      textarea.classList.remove("encrypted", "decrypted");

      if (mode === "idle") {
        mainActionBtn.textContent = "Proteggi";
        setModeBadge("In attesa");
        return;
      }

      if (mode === "decrypt") {
        mainActionBtn.textContent = "Apri";
        setModeBadge("Messaggio protetto");
        textarea.classList.add("encrypted");
        return;
      }

      mainActionBtn.textContent = "Proteggi";
      setModeBadge("Messaggio normale");
    }

    function showOverlay() {
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playEncryptVisual(inputText) {
      animText.textContent = inputText.length > 72 ? inputText.slice(0, 72) + "..." : inputText;
      animLabel.textContent = "GG84 sta proteggendo il messaggio...";
      showOverlay();
      await wait(700);
      animLabel.textContent = "Uso del collegamento attivo in corso...";
      await wait(700);
    }

    async function playDecryptVisual() {
      animText.textContent = "Messaggio protetto rilevato.";
      animLabel.textContent = "GG84 sta verificando il collegamento...";
      showOverlay();
      await wait(700);
      animLabel.textContent = "Decifratura in corso...";
      await wait(700);
    }

    function isPeerUsable(peer) {
      return !!(peer && peer.isActive && peer.pub && cleanString(peer.pub));
    }

    function ensureActivePeer() {
      const peer = getActivePeer();

      if (!isPeerUsable(peer)) {
        contactCard.classList.add("warn");
        contactName.textContent = "—";
        contactState.textContent = "In attesa di collegamento valido.";
        showBanner(errorBanner, "Prima devi collegare una persona.");
        ggError("Prima devi collegare una persona", "contactCard");
        return null;
      }

      return peer;
    }

    async function renderContactState() {
      const peer = getActivePeer();

      if (!isPeerUsable(peer)) {
        contactCard.classList.add("warn");
        contactName.textContent = "—";
        contactState.textContent = "In attesa di collegamento valido.";
        hideBanner(warningBanner);
        return;
      }

      contactName.textContent = peer.name || "Contatto collegato";

      try {
        const verified = isActivePeerVerified();

        if (verified) {
          contactCard.classList.remove("warn");
          contactState.innerHTML = "Collegamento attivo verificato ✔<br>Impronta verificata";
          hideBanner(warningBanner);
          return;
        }

        contactCard.classList.add("warn");
        contactState.innerHTML = "Collegamento attivo.<br>Verifica consigliata nella schermata collegamento";
        showBanner(warningBanner, "Connessione non verificata. Verifica l’impronta per maggiore sicurezza.");
      } catch {
        contactCard.classList.remove("warn");
        contactState.textContent = "Collegamento attivo.";
      }
    }

    async function copyTextSmart(value, okMessage) {
      const text = String(value || "").trim();
      if (!text) return false;

      try {
        const clipboardPlugin =
          window.Capacitor &&
          window.Capacitor.Plugins &&
          window.Capacitor.Plugins.Clipboard;

        const isNative =
          window.Capacitor &&
          typeof window.Capacitor.isNativePlatform === "function" &&
          window.Capacitor.isNativePlatform();

        if (isNative && clipboardPlugin && typeof clipboardPlugin.write === "function") {
          await clipboardPlugin.write({ string: text });
          showBanner(feedbackBanner, okMessage);
          ggSuccess(okMessage.replace(" ✔", ""), "text");
          return true;
        }
      } catch {}

      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          await navigator.clipboard.writeText(text);
          showBanner(feedbackBanner, okMessage);
          ggSuccess(okMessage.replace(" ✔", ""), "text");
          return true;
        }
      } catch {}

      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        ta.style.pointerEvents = "none";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);

        if (ok) {
          showBanner(feedbackBanner, okMessage);
          ggSuccess(okMessage.replace(" ✔", ""), "text");
          return true;
        }
      } catch {}

      showBanner(errorBanner, "Impossibile copiare il contenuto.");
      ggError("Impossibile copiare il contenuto", "text");
      return false;
    }

    async function readClipboardTextSmart() {
      try {
        const clipboardPlugin =
          window.Capacitor &&
          window.Capacitor.Plugins &&
          window.Capacitor.Plugins.Clipboard;

        const isNative =
          window.Capacitor &&
          typeof window.Capacitor.isNativePlatform === "function" &&
          window.Capacitor.isNativePlatform();

        if (isNative && clipboardPlugin && typeof clipboardPlugin.read === "function") {
          const result = await clipboardPlugin.read();
          return String((result && (result.value || result.string)) || "").trim();
        }
      } catch {}

      try {
        if (navigator.clipboard && typeof navigator.clipboard.readText === "function") {
          const text = await navigator.clipboard.readText();
          return String(text || "").trim();
        }
      } catch {}

      return "";
    }

    async function runMainAction() {
      clearBanners();

      const value = textarea.value.trim();
      if (!value) {
        showBanner(warningBanner, "Scrivi o incolla prima un contenuto.");
        ggWarning("Scrivi o incolla prima un contenuto", "text");
        return;
      }

      const peer = ensureActivePeer();
      if (!peer) return;

      if (!isActivePeerVerified()) {
        showBanner(warningBanner, "Connessione non verificata. Verifica l’impronta per maggiore sicurezza.");
        ggWarning("Connessione non verificata", "contactCard");
      }

      try {
        if (detectMode(value) === "decrypt") {
          await playDecryptVisual();
          const plain = await decryptMessage(value, peer.pub);
          hideOverlay();

          textarea.value = plain;
          textarea.classList.remove("encrypted");
          textarea.classList.add("decrypted");
          updateMainActionUI();
          showBanner(feedbackBanner, "Messaggio aperto correttamente ✔");
          ggSuccess("Messaggio aperto", "text");
          return;
        }

        await playEncryptVisual(value);
        const encrypted = await encryptMessage(value, peer.pub);
        hideOverlay();

        textarea.value = encrypted;
        textarea.classList.remove("decrypted");
        textarea.classList.add("encrypted");
        updateMainActionUI();
        showBanner(feedbackBanner, "Messaggio protetto correttamente ✔");
        ggSuccess("Messaggio protetto", "text");
      } catch (error) {
        hideOverlay();
        console.error(error);
        showBanner(errorBanner, "Impossibile completare l’operazione. Verifica di usare il contatto giusto.");
        ggError("Impossibile completare l’operazione", "text");
      }
    }

    async function copyOrShareText() {
      const value = textarea.value.trim();
      if (!value) {
        showBanner(warningBanner, "Non c'è nulla da inviare o copiare.");
        ggWarning("Non c'è nulla da inviare o copiare", "text");
        return;
      }

      try {
        const sharePlugin =
          window.Capacitor &&
          window.Capacitor.Plugins &&
          window.Capacitor.Plugins.Share;

        const canUseNativeShare =
          sharePlugin &&
          typeof sharePlugin.share === "function" &&
          window.Capacitor &&
          typeof window.Capacitor.isNativePlatform === "function" &&
          window.Capacitor.isNativePlatform();

        if (canUseNativeShare) {
          await sharePlugin.share({
            title: "Messaggio GG84",
            text: value,
            dialogTitle: "Invia messaggio GG84"
          });

          showBanner(feedbackBanner, "Contenuto pronto per l’invio ✔");
          ggSuccess("Contenuto pronto per l’invio", "text");
          return;
        }

        await copyTextSmart(value, "Contenuto copiato ✔");
      } catch (error) {
        console.error(error);
        const copied = await copyTextSmart(value, "Invio non disponibile. Contenuto copiato ✔");
        if (!copied) {
          showBanner(errorBanner, "Impossibile inviare o copiare il contenuto.");
          ggError("Impossibile inviare o copiare", "text");
        } else {
          ggWarning("Invio non disponibile, contenuto copiato", "text");
        }
      }
    }

    async function pasteFromClipboard() {
      const text = await readClipboardTextSmart();
      if (!text) {
        showBanner(errorBanner, "Impossibile leggere dagli appunti.");
        ggError("Impossibile leggere dagli appunti", "text");
        return;
      }

      textarea.value = text;
      updateMainActionUI();
      ggSuccess("Contenuto incollato", "text");
    }

    function clearMessageBox() {
      clearBanners();
      textarea.value = "";
      textarea.classList.remove("encrypted", "decrypted");
      updateMainActionUI();
      textarea.focus();
      ggWarning("Campo ripulito", "text");
    }

    async function boot() {
      try {
        await initGG84();
        await renderContactState();
        updateMainActionUI();
      } catch (error) {
        console.error(error);
        showBanner(errorBanner, "Impossibile inizializzare il motore sicuro.");
        ggError("Impossibile inizializzare il motore sicuro", "text");
      }
    }

    textarea.addEventListener("input", updateMainActionUI);

    if (typeof setupAndroidBackNavigation === "function") {
      setupAndroidBackNavigation();
    }

    boot();
  </script>
</body>
